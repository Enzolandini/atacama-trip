<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Atacama 2025</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223b;
      --surface3: #2d2d4e;
      --accent: #c9a84c;
      --accent2: #e8c97a;
      --text: #f0f0f0;
      --text2: #a0a0b8;
      --flight: #2a4a6e;
      --flight-accent: #4a90d9;
      --tour: #2a4a3a;
      --tour-accent: #5ab882;
      --insurance: #4a2a4a;
      --insurance-accent: #c47acc;
      --danger: #c0392b;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* ---- HEADER ---- */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--surface3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
    }
    .header-top h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.5px;
    }
    .header-top .subtitle {
      font-size: 0.72rem;
      color: var(--text2);
      margin-top: 1px;
    }
    .back-btn {
      background: var(--surface3);
      border: none;
      color: var(--text);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      cursor: pointer;
      display: none;
    }

    /* ---- NAV TABS ---- */
    .nav-tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 12px 12px;
      gap: 8px;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      border: none;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .tab-btn[data-tab="all"] { background: var(--surface3); color: var(--text2); }
    .tab-btn[data-tab="all"].active { background: var(--accent); color: #000; }
    .tab-btn[data-tab="passagens"] { background: var(--flight); color: var(--flight-accent); }
    .tab-btn[data-tab="passagens"].active { background: var(--flight-accent); color: #fff; }
    .tab-btn[data-tab="passeios"] { background: var(--tour); color: var(--tour-accent); }
    .tab-btn[data-tab="passeios"].active { background: var(--tour-accent); color: #fff; }
    .tab-btn[data-tab="seguro"] { background: var(--insurance); color: var(--insurance-accent); }
    .tab-btn[data-tab="seguro"].active { background: var(--insurance-accent); color: #fff; }

    /* ---- MAIN ---- */
    #main { padding: 12px 14px 100px; }

    /* ---- DAY GROUP ---- */
    .day-group {
      margin-bottom: 18px;
    }
    .day-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .day-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--surface3);
    }

    /* ---- DOC CARD ---- */
    .doc-card {
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      border-left: 4px solid transparent;
      transition: transform 0.15s;
    }
    .doc-card:active { transform: scale(0.98); }
    .doc-card[data-category="passagens"] { border-left-color: var(--flight-accent); }
    .doc-card[data-category="passeios"] { border-left-color: var(--tour-accent); }
    .doc-card[data-category="seguro"] { border-left-color: var(--insurance-accent); }

    .doc-card-inner {
      display: flex;
      align-items: center;
      padding: 13px 14px;
      gap: 12px;
      cursor: pointer;
    }
    .doc-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.1rem;
    }
    .doc-card[data-category="passagens"] .doc-icon { background: var(--flight); color: var(--flight-accent); }
    .doc-card[data-category="passeios"] .doc-icon { background: var(--tour); color: var(--tour-accent); }
    .doc-card[data-category="seguro"] .doc-icon { background: var(--insurance); color: var(--insurance-accent); }

    .doc-info { flex: 1; min-width: 0; }
    .doc-name {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-meta {
      font-size: 0.72rem;
      color: var(--text2);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .doc-badge {
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .doc-card[data-category="passagens"] .doc-badge { background: var(--flight); color: var(--flight-accent); }
    .doc-card[data-category="passeios"] .doc-badge { background: var(--tour); color: var(--tour-accent); }
    .doc-card[data-category="seguro"] .doc-badge { background: var(--insurance); color: var(--insurance-accent); }

    .doc-actions {
      display: flex;
      gap: 6px;
      padding: 0 14px 12px;
    }
    .btn-sm {
      border: none;
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-view { background: var(--surface3); color: var(--text); }
    .btn-delete { background: rgba(192,57,43,0.15); color: #e74c3c; }

    /* ---- EMPTY STATE ---- */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text2);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; }

    /* ---- FAB ---- */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      background: var(--accent);
      color: #000;
      border: none;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      font-size: 1.5rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(201,168,76,0.4);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fab:active { transform: scale(0.92); }

    /* ---- MODAL ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 500;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px 18px 40px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--surface3);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--accent2);
    }

    /* ---- FORM ---- */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--surface3);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      -webkit-appearance: none;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--accent); }
    .form-group select option { background: var(--surface2); }

    .upload-area {
      border: 2px dashed var(--surface3);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
    }
    .upload-area.has-file { border-color: var(--tour-accent); }
    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-area-text { font-size: 0.82rem; color: var(--text2); pointer-events: none; }
    .upload-area-text strong { display: block; font-size: 0.9rem; color: var(--text); margin-bottom: 4px; }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      width: 100%;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn-cancel {
      background: var(--surface2);
      color: var(--text2);
      border: none;
      border-radius: var(--radius);
      padding: 12px;
      width: 100%;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 8px;
    }

    /* ---- PDF VIEWER MODAL ---- */
    .viewer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 600;
      flex-direction: column;
    }
    .viewer-overlay.open { display: flex; }
    .viewer-header {
      background: var(--surface);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--surface3);
    }
    .viewer-title {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .close-btn {
      background: var(--surface3);
      border: none;
      color: var(--text);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #pdf-frame {
      flex: 1;
      border: none;
      background: #fff;
    }
    .img-viewer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 12px;
    }
    .img-viewer img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 4px;
    }

    /* ---- CATEGORY SECTIONS (passagens/passeios/seguro view) ---- */
    .section-header {
      padding: 14px 0 8px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-header .count {
      background: var(--surface3);
      color: var(--text2);
      font-size: 0.68rem;
      padding: 2px 7px;
      border-radius: 10px;
    }

    /* ---- FLIGHT SPECIAL DISPLAY ---- */
    .flight-info {
      font-size: 0.8rem;
      color: var(--flight-accent);
      margin-top: 2px;
    }

    /* ---- SCROLLABLE DATE PICKER ---- */
    .date-scroll {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .date-scroll::-webkit-scrollbar { display: none; }
    .date-chip {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--surface3);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text2);
      transition: all 0.15s;
    }
    .date-chip.selected { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

    /* ---- TOAST ---- */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface3);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 900;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ---- RESPONSIVE ---- */
    @media (min-width: 480px) {
      #main { max-width: 480px; margin: 0 auto; }
      .fab { right: calc(50% - 220px); }
    }
  </style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div>
      <h1>Atacama 2025</h1>
      <div class="subtitle">9 a 17 de agosto</div>
    </div>
    <button class="back-btn" id="back-btn" onclick="goBack()">Voltar</button>
  </div>
  <div class="nav-tabs">
    <button class="tab-btn active" data-tab="all" onclick="setTab('all')">Todos</button>
    <button class="tab-btn" data-tab="passagens" onclick="setTab('passagens')">Passagens</button>
    <button class="tab-btn" data-tab="passeios" onclick="setTab('passeios')">Passeios</button>
    <button class="tab-btn" data-tab="seguro" onclick="setTab('seguro')">Seguro</button>
  </div>
</div>

<div id="main"></div>

<button class="fab" onclick="openAddModal()" title="Adicionar documento">+</button>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Adicionar Documento</h2>
    <form id="add-form" onsubmit="submitDoc(event)">

      <div class="form-group">
        <label>Categoria</label>
        <select id="f-category" onchange="onCategoryChange()">
          <option value="passagens">Passagens</option>
          <option value="passeios">Passeios</option>
          <option value="seguro">Seguro Viagem</option>
        </select>
      </div>

      <div class="form-group" id="flight-selector-group">
        <label>Voo</label>
        <select id="f-flight">
          <option value="">-- Selecione o voo --</option>
          <option value="GRU-SCL">GRU → SCL (Sao Paulo - Santiago)</option>
          <option value="SCL-CJC">SCL → CJC (Santiago - Calama)</option>
          <option value="CJC-SCL">CJC → SCL (Calama - Santiago)</option>
          <option value="SCL-GRU">SCL → GRU (Santiago - Sao Paulo)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nome do documento</label>
        <input type="text" id="f-name" placeholder="Ex: E-ticket LATAM, Voucher Laguna Colorada..." required />
      </div>

      <div class="form-group">
        <label>Data (dia da viagem)</label>
        <div class="date-scroll" id="date-scroll"></div>
      </div>

      <div class="form-group" id="notes-group">
        <label>Observacoes (opcional)</label>
        <textarea id="f-notes" rows="2" placeholder="Horario, ponto de encontro, detalhes..." style="resize:none;"></textarea>
      </div>

      <div class="form-group">
        <label>Arquivo (PDF ou imagem)</label>
        <div class="upload-area" id="upload-area">
          <input type="file" id="f-file" accept=".pdf,image/*" onchange="onFileChange(this)" />
          <div class="upload-area-text">
            <strong id="upload-label">Toque para selecionar</strong>
            <span id="upload-sublabel">PDF, JPG, PNG</span>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-primary">Salvar</button>
      <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
    </form>
  </div>
</div>

<!-- PDF/IMAGE VIEWER -->
<div class="viewer-overlay" id="viewer-overlay">
  <div class="viewer-header">
    <button class="close-btn" onclick="closeViewer()">X</button>
    <div class="viewer-title" id="viewer-title"></div>
  </div>
  <iframe id="pdf-frame" style="display:none;"></iframe>
  <div class="img-viewer" id="img-viewer" style="display:none;">
    <img id="viewer-img" src="" alt="" />
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- DB SETUP ----
const DB_NAME = 'atacama2025';
const DB_VERSION = 1;
let db;

const TRIP_DAYS = [];
const start = new Date(2025, 7, 9); // Aug 9
for (let i = 0; i < 9; i++) {
  const d = new Date(start);
  d.setDate(start.getDate() + i);
  TRIP_DAYS.push(d);
}

const DAY_NAMES = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
const MONTH_NAMES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

function formatDate(d) {
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
function formatDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateFull(d) {
  return `${DAY_NAMES[d.getDay()]}, ${d.getDate()} de ${MONTH_NAMES[d.getMonth()]}`;
}

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('docs')) {
        const store = d.createObjectStore('docs', { keyPath: 'id', autoIncrement: true });
        store.createIndex('category', 'category', { unique: false });
        store.createIndex('dateKey', 'dateKey', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('docs', 'readonly');
    const req = tx.objectStore('docs').getAll();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e);
  });
}
function dbAdd(doc) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('docs', 'readwrite');
    const req = tx.objectStore('docs').add(doc);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e);
  });
}
function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('docs', 'readwrite');
    const req = tx.objectStore('docs').delete(id);
    req.onsuccess = () => resolve();
    req.onerror = e => reject(e);
  });
}

// ---- STATE ----
let currentTab = 'all';
let selectedDateKey = null;
let allDocs = [];
let pendingFile = null;

// ---- UI HELPERS ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function categoryLabel(c) {
  return { passagens: 'Passagem', passeios: 'Passeio', seguro: 'Seguro' }[c] || c;
}
function categoryIcon(c) {
  return { passagens: 'plane-icon', passeios: 'binoculars-icon', seguro: 'shield-icon' }[c] || '';
}
function categoryIconText(c) {
  return { passagens: 'P', passeios: 'T', seguro: 'S' }[c] || '?';
}

function flightLabel(code) {
  const map = {
    'GRU-SCL': 'GRU -> SCL',
    'SCL-CJC': 'SCL -> CJC',
    'CJC-SCL': 'CJC -> SCL',
    'SCL-GRU': 'SCL -> GRU'
  };
  return map[code] || code;
}

// ---- RENDER ----
async function render() {
  allDocs = await dbGetAll();
  const container = document.getElementById('main');

  let filtered = allDocs;
  if (currentTab !== 'all') filtered = allDocs.filter(d => d.category === currentTab);

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">---</div>
        <p>Nenhum documento ainda.<br>Toque em + para adicionar.</p>
      </div>`;
    return;
  }

  // Group by date
  const groups = {};
  TRIP_DAYS.forEach(d => { groups[formatDateKey(d)] = []; });
  // Extra bucket for docs without date or outside range
  filtered.forEach(doc => {
    if (groups[doc.dateKey] !== undefined) {
      groups[doc.dateKey].push(doc);
    } else {
      if (!groups['__other']) groups['__other'] = [];
      groups['__other'].push(doc);
    }
  });

  let html = '';
  const keys = Object.keys(groups);
  for (const key of keys) {
    const docs = groups[key];
    if (docs.length === 0) continue;

    const dateObj = key === '__other' ? null : TRIP_DAYS.find(d => formatDateKey(d) === key);
    const dayLabel = dateObj ? formatDateFull(dateObj) : 'Outros';

    html += `<div class="day-group">`;
    html += `<div class="day-label">${dayLabel}</div>`;
    docs.forEach(doc => {
      html += renderCard(doc);
    });
    html += `</div>`;
  }

  container.innerHTML = html;
}

function renderCard(doc) {
  const isPdf = doc.fileType && doc.fileType.includes('pdf');
  const hasFile = !!doc.fileData;
  const flight = doc.flightCode ? `<span class="flight-info">${flightLabel(doc.flightCode)}</span>` : '';
  const notes = doc.notes ? `<span style="color:var(--text2);font-size:0.72rem;">${doc.notes}</span>` : '';
  const fileInfo = hasFile ? `<span>${isPdf ? 'PDF' : 'Imagem'}</span>` : `<span style="opacity:0.5">Sem arquivo</span>`;

  return `
    <div class="doc-card" data-category="${doc.category}" data-id="${doc.id}">
      <div class="doc-card-inner" onclick="toggleCardActions(${doc.id})">
        <div class="doc-icon">${categoryIconText(doc.category)}</div>
        <div class="doc-info">
          <div class="doc-name">${doc.name}</div>
          <div class="doc-meta">
            <span class="doc-badge">${categoryLabel(doc.category)}</span>
            ${fileInfo}
          </div>
          ${flight}
          ${notes}
        </div>
      </div>
      <div class="doc-actions" id="actions-${doc.id}" style="display:none;">
        ${hasFile ? `<button class="btn-sm btn-view" onclick="viewDoc(${doc.id})">Ver arquivo</button>` : ''}
        <button class="btn-sm btn-delete" onclick="deleteDoc(${doc.id})">Excluir</button>
      </div>
    </div>`;
}

function toggleCardActions(id) {
  const el = document.getElementById(`actions-${id}`);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  // Close all others
  document.querySelectorAll('[id^="actions-"]').forEach(a => a.style.display = 'none');
  if (!isOpen) el.style.display = 'flex';
}

// ---- TABS ----
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
  render();
}

function goBack() {
  setTab('all');
}

// ---- ADD MODAL ----
let selectedFormDate = formatDateKey(TRIP_DAYS[0]);

function buildDateScroll() {
  const container = document.getElementById('date-scroll');
  container.innerHTML = TRIP_DAYS.map(d => {
    const key = formatDateKey(d);
    const sel = key === selectedFormDate ? 'selected' : '';
    return `<div class="date-chip ${sel}" onclick="selectFormDate('${key}', this)">${formatDate(d)} ${DAY_NAMES[d.getDay()]}</div>`;
  }).join('');
}

function selectFormDate(key, el) {
  selectedFormDate = key;
  document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function onCategoryChange() {
  const cat = document.getElementById('f-category').value;
  document.getElementById('flight-selector-group').style.display = cat === 'passagens' ? '' : 'none';
}

function onFileChange(input) {
  if (input.files.length === 0) return;
  pendingFile = input.files[0];
  const area = document.getElementById('upload-area');
  area.classList.add('has-file');
  document.getElementById('upload-label').textContent = pendingFile.name;
  document.getElementById('upload-sublabel').textContent = `${(pendingFile.size / 1024).toFixed(0)} KB`;
}

function openAddModal() {
  pendingFile = null;
  document.getElementById('add-form').reset();
  document.getElementById('upload-area').classList.remove('has-file');
  document.getElementById('upload-label').textContent = 'Toque para selecionar';
  document.getElementById('upload-sublabel').textContent = 'PDF, JPG, PNG';
  document.getElementById('flight-selector-group').style.display = '';
  buildDateScroll();
  document.getElementById('add-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('add-modal').classList.remove('open');
}

async function submitDoc(e) {
  e.preventDefault();
  const category = document.getElementById('f-category').value;
  const name = document.getElementById('f-name').value.trim();
  const notes = document.getElementById('f-notes').value.trim();
  const flightCode = category === 'passagens' ? document.getElementById('f-flight').value : '';

  let fileData = null;
  let fileType = null;
  let fileName = null;

  if (pendingFile) {
    fileData = await readFileAsBase64(pendingFile);
    fileType = pendingFile.type;
    fileName = pendingFile.name;
  }

  const doc = {
    category,
    name,
    notes,
    flightCode,
    dateKey: selectedFormDate,
    fileData,
    fileType,
    fileName,
    createdAt: Date.now()
  };

  await dbAdd(doc);
  closeModal();
  showToast('Documento salvo!');
  render();
}

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = e => reject(e);
    reader.readAsDataURL(file);
  });
}

// ---- VIEW DOC ----
function viewDoc(id) {
  const doc = allDocs.find(d => d.id === id);
  if (!doc || !doc.fileData) return;

  document.getElementById('viewer-title').textContent = doc.name;
  const isPdf = doc.fileType && doc.fileType.includes('pdf');

  const frame = document.getElementById('pdf-frame');
  const imgViewer = document.getElementById('img-viewer');
  const img = document.getElementById('viewer-img');

  if (isPdf) {
    frame.style.display = '';
    imgViewer.style.display = 'none';
    frame.src = doc.fileData;
  } else {
    frame.style.display = 'none';
    imgViewer.style.display = 'flex';
    img.src = doc.fileData;
    frame.src = '';
  }

  document.getElementById('viewer-overlay').classList.add('open');
}

function closeViewer() {
  document.getElementById('viewer-overlay').classList.remove('open');
  document.getElementById('pdf-frame').src = '';
  document.getElementById('viewer-img').src = '';
}

// ---- DELETE ----
async function deleteDoc(id) {
  if (!confirm('Excluir este documento?')) return;
  await dbDelete(id);
  showToast('Removido.');
  render();
}

// ---- CLOSE MODAL ON OVERLAY CLICK ----
document.getElementById('add-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ---- INIT ----
openDB().then(() => {
  render();
});
</script>
</body>
</html>
