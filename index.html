<script>
/* =========================================================================
   ACESSO — tela de senha simples. Só libera a exibição do app; a senha
   nunca fica em texto puro no código, apenas o hash SHA-256 dela.
   ========================================================================= */
const LOCK_STORAGE_KEY = 'atacama2026_unlocked';
const PASSWORD_HASH = '2a4d89c8de64317f7738651bc079dbedc34a1792dfde1761454c6005452e7ebb';

async function sha256Hex(text) {
  const buf = new TextEncoder().encode(text);
  const digest = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function unlockApp() {
  document.body.classList.remove('locked');
  document.getElementById('lock-overlay').classList.add('hidden');
  document.getElementById('app-content').classList.remove('hidden');
  initApp();
}

async function checkPassword(e) {
  e.preventDefault();
  const input = document.getElementById('lock-input');
  const errorEl = document.getElementById('lock-error');
  const value = input.value;
  const hash = await sha256Hex(value);
  if (hash === PASSWORD_HASH) {
    localStorage.setItem(LOCK_STORAGE_KEY, '1');
    errorEl.classList.remove('show');
    input.classList.remove('error');
    unlockApp();
  } else {
    errorEl.classList.add('show');
    input.classList.add('error');
    input.value = '';
    input.focus();
  }
  return false;
}

let appInitialized = false;
function initApp() {
  if (appInitialized) return;
  appInitialized = true;
  updateCountdown();
  document.getElementById('fab').style.display = 'none';
  openDB().then(async () => {
    extraDocs = await dbGetAll();
    render();
  });
}

let currentTab = 'cronograma';
let db;
const DB_NAME = 'atacama2026';
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('extra')) {
        const store = d.createObjectStore('extra', { keyPath: 'id', autoIncrement: true });
        store.createIndex('category', 'category', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e);
  });
}
function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('extra', 'readonly');
    const req = tx.objectStore('extra').getAll();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e);
  });
}
function dbAdd(doc) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('extra', 'readwrite');
    const req = tx.objectStore('extra').add(doc);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e);
  });
}
function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('extra', 'readwrite');
    const req = tx.objectStore('extra').delete(id);
    req.onsuccess = () => resolve();
    req.onerror = e => reject(e);
  });
}

function updateCountdown() {
  const today = new Date();
  const start = new Date(2026, 7, 9);
  const end = new Date(2026, 7, 17);
  const el = document.getElementById('countdown');
  const diffStart = Math.ceil((start - today) / 86400000);
  if (diffStart > 0) {

    el.textContent = 'Estamos na viagem!';

  }
}

function fmtDateLong(dateStr) {

  return `${dias[dt.getDay()]}, ${d} de ${meses[m-1]}`;
}

/* ---------------- REFEIÇÕES (helpers usados também no Cronograma) ---------------- */
function mealKey(date, type) { return `meal_${date}_${type}`; }
function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function timeToMinutes(t) {
  if (!t || t === '—') return -1;
  const m = String(t).replace('~', '').match(/(\d{1,2}):(\d{2})/);
  if (!m) return 9999;
  return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
}
function getMealValue(date, type, info) {
  const stored = localStorage.getItem(mealKey(date, type));
  if (stored !== null) return stored;
  return info.source === 'hotel' ? HOTEL.name : '';
}
function saveMeal(date, type, value) {
  localStorage.setItem(mealKey(date, type), value);
}
// Blocos de refeição para inserir no Cronograma (refeições incluídas em passeio já
// aparecem no próprio bloco do passeio, então aqui só entram café/almoço/jantar "livres").
function getMealBlocksForDate(date) {
  const dayMeals = MEALS.find(m => m.date === date);
  if (!dayMeals) return [];
  const blocks = [];
  MEAL_TYPES.forEach(mt => {
    const info = dayMeals[mt.key];
    if (!info || info.source === 'tour') return;
    const value = getMealValue(date, mt.key, info);
    const subParts = [value || 'A definir — adicione na aba Refeições'];
    if (info.note) subParts.push(info.note);
    blocks.push({ time: info.time, end: '', type: 'refeicao', title: mt.label, sub: subParts.join(' · '), mealDate: date });
  });
  return blocks;
}

function checklistKey(scope, idx) { return `check_${scope}_${idx}`; }

function renderItens() {
  let html = `<div class="intro-banner">Checklist do que levar em cada passeio. Os itens marcados ficam salvos no seu aparelho.</div>`;

  html += `<div class="section-header">Itens gerais da viagem</div>`;
  html += renderChecklistBlock('geral', GENERAL_ITEMS);

  TOURS.forEach(t => {
    html += `<div class="section-header" id="itens-${t.id}">${t.time} · ${t.title}</div>`;
    html += renderChecklistBlock(t.id, t.items);
  });

  return html;
}

function renderChecklistBlock(scope, items) {
  let html = `<div class="checklist-progress" id="progress-${scope}"></div>`;
  items.forEach((item, idx) => {
    const key = checklistKey(scope, idx);
    const checked = localStorage.getItem(key) === '1';
    html += `
      <label class="check-item ${checked ? 'checked' : ''}" data-scope="${scope}" data-idx="${idx}">
        <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleCheck('${scope}', ${idx}, this.checked)" />
        <span>${item}</span>
      </label>`;
  });
  return html;
}

function toggleCheck(scope, idx, checked) {
  const key = checklistKey(scope, idx);
  if (checked) localStorage.setItem(key, '1'); else localStorage.removeItem(key);
  const label = document.querySelector(`.check-item[data-scope="${scope}"][data-idx="${idx}"]`);
  if (label) label.classList.toggle('checked', checked);
  updateProgress(scope);
}

function updateProgress(scope) {
  const items = scope === 'geral' ? GENERAL_ITEMS : (findTour(scope) ? findTour(scope).items : []);
  const total = items.length;
  let done = 0;
  for (let i = 0; i < total; i++) if (localStorage.getItem(checklistKey(scope, i)) === '1') done++;
  const el = document.getElementById('progress-' + scope);
  if (el) el.innerHTML = `<b>${done}/${total}</b> itens prontos`;
}

function attachChecklistHandlers() {
  updateProgress('geral');
  TOURS.forEach(t => updateProgress(t.id));
}

function closeViewer() {
  document.getElementById('viewer-overlay').classList.remove('open');
  document.getElementById('pdf-frame').src = '';
  document.getElementById('viewer-img').src = '';
}

/* ---------------- EXTRA DOCS (IndexedDB) ---------------- */
let pendingFile = null;
let addModalCategory = 'documentos';

function openAddModal(category) {
  addModalCategory = category;
  pendingFile = null;
  document.getElementById('add-form').reset();
  document.getElementById('f-category').value = category;
  document.getElementById('add-modal-title').textContent = category === 'documentos' ? 'Adicionar Documento' : 'Adicionar Passeio Extra';
  document.getElementById('upload-area').classList.remove('has-file');
  document.getElementById('upload-label').textContent = 'Toque para selecionar';
  document.getElementById('upload-sublabel').textContent = 'PDF, JPG, PNG';
  document.getElementById('add-modal').classList.add('open');
}
function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

function onFileChange(input) {
  if (input.files.length === 0) return;
  pendingFile = input.files[0];
  const area = document.getElementById('upload-area');
  area.classList.add('has-file');
  document.getElementById('upload-label').textContent = pendingFile.name;
  document.getElementById('upload-sublabel').textContent = `${(pendingFile.size / 1024).toFixed(0)} KB`;
}

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = e => reject(e);
    reader.readAsDataURL(file);
  });
}

async function submitDoc(e) {
  e.preventDefault();
  const category = document.getElementById('f-category').value;
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-date').value;
  const notes = document.getElementById('f-notes').value.trim();

  let fileData = null, fileType = null, fileName = null;
  if (pendingFile) {
    fileData = await readFileAsBase64(pendingFile);
    fileType = pendingFile.type;
    fileName = pendingFile.name;
  }

  const doc = { category, name, date, notes, fileData, fileType, fileName, createdAt: Date.now() };
  await dbAdd(doc);
  closeModal();
  showToast('Salvo!');
  extraDocs = await dbGetAll();
  render();
}

function viewExtra(id) {
  const doc = extraDocs.find(d => d.id === id);
  if (!doc || !doc.fileData) return;
  document.getElementById('viewer-title').textContent = doc.name;
  const isPdf = doc.fileType && doc.fileType.includes('pdf');
  const frame = document.getElementById('pdf-frame');
  const imgViewer = document.getElementById('img-viewer');
  const img = document.getElementById('viewer-img');
  if (isPdf) {
    frame.style.display = ''; imgViewer.style.display = 'none'; frame.src = doc.fileData;
  } else {
    frame.style.display = 'none'; imgViewer.style.display = 'flex'; img.src = doc.fileData; frame.src = '';
  }
  document.getElementById('viewer-overlay').classList.add('open');
}

async function deleteExtra(id) {
  if (!confirm('Excluir este item?')) return;
  await dbDelete(id);
  showToast('Removido.');
  extraDocs = await dbGetAll();
  render();
}

document.getElementById('add-modal').addEventListener('click', function (e) { if (e.target === this) closeModal(); });

/* ---------------- INIT ---------------- */
if (localStorage.getItem(LOCK_STORAGE_KEY) === '1') {
  unlockApp();
}
</script>
